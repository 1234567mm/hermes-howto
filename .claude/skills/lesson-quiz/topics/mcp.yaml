topic: mcp
title: "MCP Integration Quiz"
description: Test your knowledge of Model Context Protocol integration
module: "05-mcp"

questions:
  - question: "What protocol does MCP use for Hermes to connect with external services?"
    choices:
      - text: "Model Context Protocol"
        key: "A"
      - text: "Simple Object Protocol"
        key: "B"
      - text: "Master Control Protocol"
        key: "C"
      - text: "Message Channel Protocol"
        key: "D"
    correct_answer: "A"
    explanation: "MCP stands for Model Context Protocol, a standardized interface."

  - question: "What is the correct format for MCP tool names?"
    choices:
      - text: "{server}_{tool_name}"
        key: "A"
      - text: "{tool_name}@{server}"
        key: "B"
      - text: "server.tool_name"
        key: "C"
      - text: "{tool_name}"
        key: "D"
    correct_answer: "A"
    explanation: "Tools are named {server}_{tool_name}, e.g., filesystem_read_file."

  - question: "Which command adds a new MCP server?"
    choices:
      - text: "mcp add <name> <command> [args]"
        key: "A"
      - text: "mcp create <name> <command>"
        key: "B"
      - text: "mcp register <name> <server>"
        key: "C"
      - text: "mcp new <name> <path>"
        key: "D"
    correct_answer: "A"
    explanation: "mcp add <name> <command> [args] adds a server to the configuration."

  - question: "What does MCP filtering help control?"
    choices:
      - text: "Which tools are available to agents"
        key: "A"
      - text: "Network bandwidth usage"
        key: "B"
      - text: "Server connection speed"
        key: "C"
      - text: "User authentication"
        key: "D"
    correct_answer: "A"
    explanation: "Filtering restricts which MCP tools are exposed to Hermes agents."

  - question: "Where are user-wide MCP server configurations stored?"
    choices:
      - text: "~/.claude/mcp_servers/"
        key: "A"
      - text: "~/.hermes/mcp/"
        key: "B"
      - text: "/etc/mcp/servers/"
        key: "C"
      - text: "~/.config/mcp/"
        key: "D"
    correct_answer: "A"
    explanation: "User servers go in ~/.claude/mcp_servers/, project servers in .claude/mcp_servers/."

  - question: "What filter pattern allows only read operations on filesystem?"
    choices:
      - text: "include: [\"read_*\", \"list_*\"]"
        key: "A"
      - text: "include: [\"write_*\", \"delete_*\"]"
        key: "B"
      - text: "include: [\"*\"], exclude: []"
        key: "C"
      - text: "readonly: true"
        key: "D"
    correct_answer: "A"
    explanation: "Include patterns like read_* and list_* for read-only filesystem access."

  - question: "What is a key security benefit of MCP filtering?"
    choices:
      - text: "Restricting dangerous operations like file deletions"
        key: "A"
      - text: "Encrypting all server communications"
        key: "B"
      - text: "Authenticating server connections"
        key: "C"
      - text: "Auditing user login times"
        key: "D"
    correct_answer: "A"
    explanation: "Filtering prevents dangerous operations like delete_file or destroy_container."

  - question: "What is the benefit of MCP hot reload?"
    choices:
      - text: "Update server configs without restart"
        key: "A"
      - text: "Faster tool execution"
        key: "B"
      - text: "Automatic server failover"
        key: "C"
      - text: "Reduced memory usage"
        key: "D"
    correct_answer: "A"
    explanation: "MCP servers can be updated without restarting Hermes."
