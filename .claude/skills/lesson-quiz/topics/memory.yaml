topic: memory
title: "Hermes Agent Memory Quiz"
description: Test your knowledge of persistent context and memory management
module: "02-memory"

questions:
  - question: "What are the two main memory-related commands in Hermes Agent?"
    category: conceptual
    choices:
      - text: "/init and /memory"
        key: "A"
      - text: "/remember and /forget"
        key: "B"
      - text: "/save and /load"
        key: "C"
      - text: "/context and /persist"
        key: "D"
    correct_answer: "A"
    explanation: "Hermes Agent has two main memory commands: /init creates a new HERMES.md file, and /memory edits existing memory files."

  - question: "Where can HERMES.md files be located? (Select all that apply)"
    category: conceptual
    choices:
      - text: "./HERMES.md (project root)"
        key: "A"
      - text: "~/.hermes/HERMES.md (user home)"
        key: "B"
      - text: "./HERMES.local.md (git-ignored local)"
        key: "C"
      - text: "~/.hermes/projects/<project>/memory/MEMORY.md"
        key: "D"
    correct_answer: "ABC"
    explanation: "HERMES.md can be at project root, user home (~/.hermes/HERMES.md), or git-ignored local (HERMES.local.md). The MEMORY.md path is for Auto Memory, not HERMES.md."

  - question: "What does the /init command do?"
    category: practical
    choices:
      - text: "Creates a new HERMES.md file with a starter template"
        key: "A"
      - text: "Initializes a new Hermes Agent session"
        key: "B"
      - text: "Creates a MEMORY.md file for auto-generated learnings"
        key: "C"
      - text: "Starts the Hermes Agent daemon"
        key: "D"
    correct_answer: "A"
    explanation: "/init creates a new HERMES.md file with a starter template for project configuration, establishing the foundation for context persistence."

  - question: "What is the /memory command used for?"
    category: practical
    choices:
      - text: "Editing existing memory files in your system editor"
        key: "A"
      - text: "Adding new facts to memory"
        key: "B"
      - text: "Listing all memory entries"
        key: "C"
      - text: "Deleting specific memory entries"
        key: "D"
    correct_answer: "A"
    explanation: "/memory opens your system editor to let you edit existing memory files. It allows you to modify the content of HERMES.md or other memory files."

  - question: "How many levels does the Hermes memory hierarchy have, and which has the highest priority?"
    category: conceptual
    choices:
      - text: "5 levels, Project Memory is highest"
        key: "A"
      - text: "6 levels, Managed Policy is highest"
        key: "B"
      - text: "7 levels, Managed Policy is highest"
        key: "C"
      - text: "4 levels, User Memory is highest"
        key: "D"
    correct_answer: "C"
    explanation: "The memory hierarchy has 7 levels: Managed Policy (highest) > Project Memory > Project Rules > User Memory > User Rules > Local Memory > Auto Memory (lowest)."

  - question: "What happens when you use the @ syntax for imports in HERMES.md?"
    category: practical
    choices:
      - text: "References external files to include their content in the prompt"
        key: "A"
      - text: "Creates a hyperlink to external documentation"
        key: "B"
      - text: "Imports memory from another project"
        key: "C"
      - text: "Attaches files to the conversation"
        key: "D"
    correct_answer: "A"
    explanation: "The @ syntax in HERMES.md (e.g., @docs/api.md) references external files and includes their content directly in the prompt. It supports relative and absolute paths, with recursive imports up to 5 levels deep."

  - question: "What is the difference between HERMES.md and MEMORY.md?"
    category: conceptual
    choices:
      - text: "HERMES.md is manually curated by you; MEMORY.md is auto-generated by Hermes during sessions"
        key: "A"
      - text: "HERMES.md stores project rules; MEMORY.md stores user preferences"
        key: "B"
      - text: "HERMES.md is encrypted; MEMORY.md is plain text"
        key: "C"
      - text: "There is no difference - they are synonyms"
        key: "D"
    correct_answer: "A"
    explanation: "HERMES.md is manually created and maintained by you with instructions, standards, and context. MEMORY.md (in Auto Memory) is automatically written by Hermes during sessions to capture learned patterns."

  - question: "What is the maximum depth for @ imports in HERMES.md?"
    category: practical
    choices:
      - text: "3 levels deep"
        key: "A"
      - text: "5 levels deep"
        key: "B"
      - text: "Unlimited depth"
        key: "C"
      - text: "10 levels deep"
        key: "D"
    correct_answer: "B"
    explanation: "The @ import syntax supports recursive imports up to a maximum depth of 5 levels to prevent infinite loops."

  - question: "What does path-specific rules allow you to do in HERMES.md?"
    category: practical
    choices:
      - text: "Apply different rules to specific file paths using YAML frontmatter with paths: glob pattern"
        key: "A"
      - text: "Store rules in a separate directory"
        key: "B"
      - text: "Share rules between projects"
        key: "C"
      - text: "Encrypt rules for sensitive directories"
        key: "D"
    correct_answer: "A"
    explanation: "Path-specific rules use YAML frontmatter with a paths: field containing glob patterns (e.g., paths: src/api/**/*.ts) to apply rules only to matching files."
