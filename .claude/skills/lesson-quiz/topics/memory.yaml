topic: memory
title: "Hermes Agent Memory Quiz"
description: Test your knowledge of persistent context and memory management
module: "02-memory"

questions:
  - question: "What is the difference between MEMORY.md and USER.md?"
    choices:
      - text: "They are identical - just different names"
        key: "A"
      - text: "MEMORY.md stores persistent facts, USER.md stores current context"
        key: "B"
      - text: "USER.md is for user preferences, MEMORY.md is for session data"
        key: "C"
      - text: "MEMORY.md is encrypted, USER.md is plain text"
        key: "D"
    correct_answer: "B"
    explanation: "MEMORY.md contains persistent facts about the user, while USER.md holds current conversation context."

  - question: "Where does Hermes store memory files by default?"
    choices:
      - text: "~/.hermes/memories/"
        key: "A"
      - text: "~/.hermes/context/"
        key: "B"
      - text: "~/.hermes/data/"
        key: "C"
      - text: "~/.hermes/memory/"
        key: "D"
    correct_answer: "A"
    explanation: "Memory files are stored in ~/.hermes/memories/ directory."

  - question: "Which command adds a new memory entry?"
    choices:
      - text: "memory add \"fact\""
        key: "A"
      - text: "/memory-add \"fact\""
        key: "B"
      - text: "hermes remember \"fact\""
        key: "C"
      - text: "Both A and B"
        key: "D"
    correct_answer: "D"
    explanation: "Both 'memory add' and '/memory-add' commands add new memory entries."

  - question: "What does the 'memory replace' command do?"
    choices:
      - text: "Replaces all existing memories"
        key: "A"
      - text: "Updates a specific memory entry by index"
        key: "B"
      - text: "Swaps MEMORY.md with USER.md"
        key: "C"
      - text: "Replaces the entire memory file"
        key: "D"
    correct_answer: "B"
    explanation: "'memory replace' updates a specific memory entry using its index number."

  - question: "What is a frozen snapshot in Hermes memory?"
    choices:
      - text: "A backup of all memory files"
        key: "A"
      - text: "A point-in-time capture that cannot be modified"
        key: "B"
      - text: "An encrypted version of memory"
        key: "C"
      - text: "A shared memory accessible across sessions"
        key: "D"
    correct_answer: "B"
    explanation: "A frozen snapshot is an immutable point-in-time capture of memory state."

  - question: "How do you remove a specific memory entry?"
    choices:
      - text: "memory delete [index]"
        key: "A"
      - text: "memory remove [index]"
        key: "B"
      - text: "memory forget [index]"
        key: "C"
      - text: "Both A and B"
        key: "D"
    correct_answer: "D"
    explanation: "Both 'memory delete' and 'memory remove' can remove a memory entry by index."

  - question: "What is the purpose of the USER.md file during a session?"
    choices:
      - text: "Stores user authentication credentials"
        key: "A"
      - text: "Contains current conversation context and recent facts"
        key: "B"
      - text: "Holds encrypted user data"
        key: "C"
      - text: "Logs all user commands"
        key: "D"
    correct_answer: "B"
    explanation: "USER.md contains the current conversation context and recent facts for the active session."

  - question: "Which command lists all current memory entries?"
    choices:
      - text: "memory list"
        key: "A"
      - text: "memory show"
        key: "B"
      - text: "memory display"
        key: "C"
      - text: "Both A and B"
        key: "D"
    correct_answer: "D"
    explanation: "Both 'memory list' and 'memory show' display all memory entries."
