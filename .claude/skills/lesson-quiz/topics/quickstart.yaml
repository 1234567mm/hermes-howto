topic: quickstart
title: "Hermes Agent Quickstart Quiz"
description: Test your knowledge of getting started with Hermes Agent
module: "01-quickstart"

questions:
  - question: "How do you check the Hermes Agent version?"
    category: conceptual
    choices:
      - text: "hermes --version"
        key: "A"
      - text: "hermes version"
        key: "B"
      - text: "hermes -v"
        key: "C"
      - text: "version hermes"
        key: "D"
    correct_answer: "A"
    explanation: "The hermes --version command displays the installed Hermes Agent version, e.g., 'Hermes Agent v1.0.0'."

  - question: "What command starts an interactive Hermes session?"
    category: practical
    choices:
      - text: "hermes"
        key: "A"
      - text: "hermes start"
        key: "B"
      - text: "hermes chat"
        key: "C"
      - text: "hermes shell"
        key: "D"
    correct_answer: "A"
    explanation: "Running 'hermes' without arguments starts an interactive REPL mode where you can have a conversation with Hermes Agent."

  - question: "Which command opens a browser window for OAuth authentication?"
    category: practical
    choices:
      - text: "hermes login"
        key: "A"
      - text: "hermes auth"
        key: "B"
      - text: "hermes signin"
        key: "C"
      - text: "hermes oauth"
        key: "D"
    correct_answer: "A"
    explanation: "The 'hermes login' command opens a browser window for OAuth authentication with your Nous Research account."

  - question: "Which of the following is a built-in slash command in Hermes Agent?"
    category: conceptual
    choices:
      - text: "/help"
        key: "A"
      - text: "/init"
        key: "B"
      - text: "/doctor"
        key: "C"
      - text: "All of the above"
        key: "D"
    correct_answer: "D"
    explanation: "All of these are built-in slash commands: /help shows all commands, /init initializes HERMES.md (in Memory module), /doctor runs diagnostics."

  - question: "What does the 'hermes doctor' command do?"
    category: practical
    choices:
      - text: "Checks installation health and suggests fixes"
        key: "A"
      - text: "Starts the Hermes daemon"
        key: "B"
      - text: "Diagnoses memory issues"
        key: "C"
      - text: "Lists all available commands"
        key: "D"
    correct_answer: "A"
    explanation: "The 'hermes doctor' command checks your installation health and suggests fixes for common issues."

  - question: "How do you exit an interactive Hermes session?"
    category: practical
    choices:
      - text: "Ctrl+D or typing '/exit'"
        key: "A"
      - text: "Ctrl+C"
        key: "B"
      - text: "Ctrl+Z"
        key: "C"
      - text: "typing 'quit'"
        key: "D"
    correct_answer: "A"
    explanation: "Ctrl+D or typing '/exit' properly ends the interactive session. /exit is one of the built-in slash commands."

  - question: "What installation methods does Hermes Agent support on Linux?"
    category: conceptual
    choices:
      - text: "curl install script and manual binary installation"
        key: "A"
      - text: "apt-get install"
        key: "B"
      - text: "npm install -g"
        key: "C"
      - text: "brew install"
        key: "D"
    correct_answer: "A"
    explanation: "On Linux, Hermes can be installed via curl -sSL https://storage.googleapis.com/hermes-agent/hermes.sh | sh or by downloading the binary manually."

  - question: "What does the /init command do in Hermes Agent?"
    category: practical
    choices:
      - text: "Creates a new HERMES.md file with a starter template"
        key: "A"
      - text: "Initializes a new Hermes Agent session"
        key: "B"
      - text: "Updates Hermes to latest version"
        key: "C"
      - text: "Creates the ~/.hermes directory"
        key: "D"
    correct_answer: "A"
    explanation: "/init is a memory command that creates a new HERMES.md file with a starter template for project configuration. Note: it's a slash command (/init), not 'hermes init'."
