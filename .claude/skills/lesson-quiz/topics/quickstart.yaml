topic: quickstart
title: "Hermes Agent Quickstart Quiz"
description: Test your knowledge of getting started with Hermes Agent
module: "01-quickstart"

questions:
  - question: "How do you check the Hermes Agent version?"
    choices:
      - text: "hermes --version"
        key: "A"
      - text: "hermes version"
        key: "B"
      - text: "hermes -v"
        key: "C"
      - text: "version hermes"
        key: "D"
    correct_answer: "A"
    explanation: "The --version flag is the standard way to check the Hermes version."

  - question: "Where is the default Hermes configuration file located?"
    choices:
      - text: "~/.config/hermes/settings.json"
        key: "A"
      - text: "~/.hermes/settings.json"
        key: "B"
      - text: "/etc/hermes/settings.json"
        key: "C"
      - text: "~/hermes.json"
        key: "D"
    correct_answer: "B"
    explanation: "Hermes stores configuration in ~/.hermes/settings.json by default."

  - question: "Which installation method is NOT mentioned in the quickstart guide?"
    choices:
      - text: "curl script installation"
        key: "A"
      - text: "pip install"
        key: "B"
      - text: "npm install -g"
        key: "C"
      - text: "apt-get install"
        key: "D"
    correct_answer: "D"
    explanation: "The quickstart covers curl, pip, and npm, but not apt-get."

  - question: "What is the recommended first conversation pattern with Hermes?"
    choices:
      - text: "Asking complex coding questions immediately"
        key: "A"
      - text: "Starting with a simple greeting and one task"
        key: "B"
      - text: "Providing a full project specification"
        key: "C"
      - text: "Asking about Hermes capabilities first"
        key: "D"
    correct_answer: "B"
    explanation: "Start simple - a greeting and one task helps establish the interaction pattern."

  - question: "What command starts an interactive Hermes session?"
    choices:
      - text: "hermes start"
        key: "A"
      - text: "hermes chat"
        key: "B"
      - text: "hermes"
        key: "C"
      - text: "hermes shell"
        key: "D"
    correct_answer: "C"
    explanation: "Running 'hermes' without arguments starts an interactive session."

  - question: "How do you exit an interactive Hermes session?"
    choices:
      - text: "Ctrl+C"
        key: "A"
      - text: "Ctrl+D or typing 'exit'"
        key: "B"
      - text: "Ctrl+Z"
        key: "C"
      - text: "typing 'quit'"
        key: "D"
    correct_answer: "B"
    explanation: "Ctrl+D or typing 'exit' properly ends the session."

  - question: "Which file extension does Hermes use for conversation exports?"
    choices:
      - text: ".json"
        key: "A"
      - text: ".hermes"
        key: "B"
      - text: ".md"
        key: "C"
      - text: ".chat"
        key: "D"
    correct_answer: "C"
    explanation: "Hermes exports conversations as Markdown (.md) files."

  - question: "What does the 'hermes init' command do?"
    choices:
      - text: "Starts a new conversation"
        key: "A"
      - text: "Creates initial configuration files"
        key: "B"
      - text: "Updates Hermes to latest version"
        key: "C"
      - text: "Lists all available commands"
        key: "D"
    correct_answer: "B"
    explanation: "'hermes init' creates the initial ~/.hermes directory and configuration."
