topic: skills
title: "Skills System Quiz"
description: Test your knowledge of Hermes skills and slash commands
module: "03-skills"

questions:
  - question: "What file is required for a skill to be recognized?"
    choices:
      - text: "SKILL.md"
        key: "A"
      - text: "skill.yaml"
        key: "B"
      - text: "skill.json"
        key: "C"
      - text: "manifest.md"
        key: "D"
    correct_answer: "A"
    explanation: "Every skill requires a SKILL.md file with YAML frontmatter."

  - question: "What field in SKILL.md frontmatter defines when Claude auto-invokes a skill?"
    choices:
      - text: "description"
        key: "A"
      - text: "name"
        key: "B"
      - text: "trigger"
        key: "C"
      - text: "keywords"
        key: "D"
    correct_answer: "A"
    explanation: "The description field is critical for auto-invocation matching."

  - question: "What does disable-model-invocation: true do?"
    choices:
      - text: "Only user can invoke via /name, Claude never auto-invokes"
        key: "A"
      - text: "Disables the skill entirely"
        key: "B"
      - text: "Prevents user from invoking the skill"
        key: "C"
      - text: "Makes the skill hidden from all menus"
        key: "D"
    correct_answer: "A"
    explanation: "When true, only the user can invoke the skill via /name explicitly."

  - question: "What variable substitutes all arguments passed to a skill?"
    choices:
      - text: "$ARGUMENTS"
        key: "A"
      - text: "$ARGS"
        key: "B"
      - text: "$INPUT"
        key: "C"
      - text: "$PARAMS"
        key: "D"
    correct_answer: "A"
    explanation: "$ARGUMENTS contains all arguments passed when invoking the skill."

  - question: "What does context: fork do in skill frontmatter?"
    choices:
      - text: "Runs skill in a forked subagent context"
        key: "A"
      - text: "Forks the skill for parallel execution"
        key: "B"
      - text: "Creates a copy of the skill"
        key: "C"
      - text: "Forks the conversation thread"
        key: "D"
    correct_answer: "A"
    explanation: "context: fork runs the skill in an isolated subagent context."

  - question: "What syntax injects dynamic content from shell commands?"
    choices:
      - text: "!(command)"
        key: "A"
      - text: "$(command)"
        key: "B"
      - text: "`command`"
        key: "C"
      - text: "#{command}"
        key: "D"
    correct_answer: "A"
    explanation: "The !`(command)` syntax runs shell commands and inlines output."

  - question: "What is the maximum character limit for skill names?"
    choices:
      - text: "64 characters"
        key: "A"
      - text: "32 characters"
        key: "B"
      - text: "128 characters"
        key: "C"
      - text: "No limit"
        key: "D"
    correct_answer: "A"
    explanation: "Skill names must be 64 characters or fewer, lowercase with hyphens."

  - question: "Which field restricts what tools a skill can use?"
    choices:
      - text: "allowed-tools"
        key: "A"
      - text: "tools-only"
        key: "B"
      - text: "tool-restrict"
        key: "C"
      - text: "tool-access"
        key: "D"
    correct_answer: "A"
    explanation: "allowed-tools is a comma-separated list of permitted tools."
