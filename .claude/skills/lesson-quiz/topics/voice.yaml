topic: voice
title: "Voice Mode Quiz"
description: Test your knowledge of Hermes voice interaction
module: "06-voice"

questions:
  - question: "What command starts Hermes in basic voice mode?"
    choices:
      - text: "hermes voice"
        key: "A"
      - text: "hermes speak"
        key: "B"
      - text: "hermes audio"
        key: "C"
      - text: "hermes talk"
        key: "D"
    correct_answer: "A"
    explanation: "hermes voice starts the interactive voice mode with default settings."

  - question: "Which voice command ends a voice session?"
    choices:
      - text: "exit or quit"
        key: "A"
      - text: "stop"
        key: "B"
      - text: "end"
        key: "C"
      - text: "close"
        key: "D"
    correct_answer: "A"
    explanation: "Say 'exit' or 'quit' to end a voice session."

  - question: "What flag enables continuous listening mode?"
    choices:
      - text: "--continuous"
        key: "A"
      - text: "--listen"
        key: "B"
      - text: "--always"
        key: "C"
      - text: "--stream"
        key: "D"
    correct_answer: "A"
    explanation: "--continuous mode keeps Hermes listening after each response."

  - question: "What does the --ptt flag do?"
    choices:
      - text: "Enables push-to-talk mode"
        key: "A"
      - text: "Enables pause-to-think mode"
        key: "B"
      - text: "Enables privacy tracking"
        key: "C"
      - text: "Enables private text mode"
        key: "D"
    correct_answer: "A"
    explanation: "Push-to-talk requires holding spacebar to speak, useful in noisy environments."

  - question: "What key toggles mute in voice mode?"
    choices:
      - text: "M"
        key: "A"
      - text: "Ctrl+M"
        key: "B"
      - text: "Space"
        key: "C"
      - text: "Esc"
        key: "D"
    correct_answer: "A"
    explanation: "Press M to toggle mute during a voice session."

  - question: "How do you save voice preferences as a named profile?"
    choices:
      - text: "hermes voice --save-profile default"
        key: "A"
      - text: "hermes voice --profile-save default"
        key: "B"
      - text: "hermes voice --config save default"
        key: "C"
      - text: "hermes voice --export default"
        key: "D"
    correct_answer: "A"
    explanation: "--save-profile stores current settings, --profile loads them."

  - question: "What does --text-only mode do?"
    choices:
      - text: "Disables speech output, shows text only"
        key: "A"
      - text: "Disables microphone input"
        key: "B"
      - text: "Enables text transcription only"
        key: "C"
      - text: "Shows text alongside audio"
        key: "D"
    correct_answer: "A"
    explanation: "--text-only disables text-to-speech, showing responses as text."

  - question: "Which shortcut repeats the last voice response?"
    choices:
      - text: "R"
        key: "A"
      - text: "P"
        key: "B"
      - text: "L"
        key: "C"
      - text: "S"
        key: "D"
    correct_answer: "A"
    explanation: "Press R to repeat the last spoken response."
