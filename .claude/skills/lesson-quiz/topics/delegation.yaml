topic: delegation
title: "Delegation & Subagents Quiz"
description: Test your knowledge of delegating tasks to subagents
module: "04-delegation"

questions:
  - question: "What tool is used for delegating tasks to subagents?"
    choices:
      - text: "delegate_task"
        key: "A"
      - text: "subagent_spawn"
        key: "B"
      - text: "parallel_execute"
        key: "C"
      - text: "spawn_worker"
        key: "D"
    correct_answer: "A"
    explanation: "The delegate_task tool spawns isolated subagents for parallel work."

  - question: "What parameter resumes an existing subagent session?"
    choices:
      - text: "agentId"
        key: "A"
      - text: "session_id"
        key: "B"
      - text: "resume_id"
        key: "C"
      - text: "agent_session"
        key: "D"
    correct_answer: "A"
    explanation: "The agentId parameter allows resuming a previous subagent by its ID."

  - question: "Which built-in agent is best for read-only codebase exploration?"
    choices:
      - text: "Explore"
        key: "A"
      - text: "Bash"
        key: "B"
      - text: "general-purpose"
        key: "C"
      - text: "Plan"
        key: "D"
    correct_answer: "A"
    explanation: "The Explore agent has Read, Grep, and Glob tools for read-only exploration."

  - question: "What is the context isolation behavior for subagents?"
    choices:
      - text: "Each subagent gets a clean slate context"
        key: "A"
      - text: "Subagents share the main agent context"
        key: "B"
      - text: "Subagents inherit all conversation history"
        key: "C"
      - text: "Context is never isolated"
        key: "D"
    correct_answer: "A"
    explanation: "Subagents initialize with a fresh context for focused task execution."

  - question: "Where are project-level agent definitions stored?"
    choices:
      - text: ".claude/agents/"
        key: "A"
      - text: "~/agents/"
        key: "B"
      - text: "./hermes/agents/"
        key: "C"
      - text: "/etc/hermes/agents/"
        key: "D"
    correct_answer: "A"
    explanation: "Project agents are defined in .claude/agents/ within the project."

  - question: "What keyboard shortcut backgrounds a running subagent?"
    choices:
      - text: "Ctrl+B"
        key: "A"
      - text: "Ctrl+Z"
        key: "B"
      - text: "Ctrl+F"
        key: "C"
      - text: "Ctrl+G"
        key: "D"
    correct_answer: "A"
    explanation: "Ctrl+B backgrounds a running subagent, Ctrl+F kills all background agents."

  - question: "Which agent type should be used for terminal commands in isolation?"
    choices:
      - text: "Bash"
        key: "A"
      - text: "Explore"
        key: "B"
      - text: "general-purpose"
        key: "C"
      - text: "Plan"
        key: "D"
    correct_answer: "A"
    explanation: "The Bash agent provides isolated shell command execution."

  - question: "What does delegate_task return when called?"
    choices:
      - text: "agentId and result"
        key: "A"
      - text: "Full context dump"
        key: "B"
      - text: "Conversation transcript"
        key: "C"
      - text: "Tool call history"
        key: "D"
    correct_answer: "A"
    explanation: "delegate_task returns {agentId, result} - the agent ID and task results."
